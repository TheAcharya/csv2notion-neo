# Flake8 + wemake-python-styleguide (replaces flakehell; flakehell is incompatible with flake8 7+).
# Ported from [tool.flakehell] in pyproject.toml (pre–dev toolchain update).
[flake8]
max-line-length = 88
select = WPS
show-source = true
# Black compatibility + project preferences (see pyproject.toml [tool.flakehell.plugins])
extend-ignore =
    E203,
    W503,
    C812,
    Q000,
    D100,
    D104,
    D401,
    W504,
    RST303,
    RST304,
    DAR103,
    DAR203,
    WPS111,
    WPS201,
    WPS226,
    WPS237,
    WPS305,
    WPS317,
    WPS323,
    WPS326,
    WPS336,
    WPS437,
    WPS601
per-file-ignores =
    csv2notion_neo/version.py:WPS410
    tests/*:WPS110,WPS114,WPS117,WPS118,WPS122,WPS202,WPS203,WPS204,WPS210,WPS213,WPS214,WPS218,WPS219,WPS220,WPS221,WPS229,WPS231,WPS232,WPS300,WPS336,WPS338,WPS358,WPS407,WPS420,WPS421,WPS430,WPS432,WPS441,WPS459,WPS473,WPS501,WPS507,WPS520,S101,S105
